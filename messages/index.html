<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Anonymous Messages</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #090a0f;
            --card-bg: rgba(18, 20, 29, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-pink: #ff4b8b;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Mesh BG */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-purple), transparent 70%);
            top: -10%;
            right: -10%;
        }

        .blob-2 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--accent-cyan), transparent 70%);
            bottom: -10%;
            left: -10%;
        }

        /* Auth Modal Gate */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(9, 10, 15, 0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 440px;
            border-radius: 28px;
            padding: 36px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(139, 92, 246, 0.2);
        }

        .auth-icon {
            width: 70px;
            height: 70px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent-purple);
            font-size: 1.75rem;
        }

        .auth-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .auth-input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .auth-input {
            width: 100%;
            height: 52px;
            background: rgba(10, 12, 20, 0.8);
            border: 1.5px solid var(--card-border);
            border-radius: 16px;
            padding: 0 20px;
            color: var(--text-primary);
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .auth-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-pink) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.6);
        }

        .auth-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }

        /* Layout Main Dashboard */
        .wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            z-index: 10;
            position: relative;
        }

        /* Top Header */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
            flex-wrap: wrap;
            gap: 16px;
        }

        .brand-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-title i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-btn.danger {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
            background: rgba(248, 113, 113, 0.1);
        }

        .action-btn.danger:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-icon.pink {
            background: rgba(255, 75, 139, 0.15);
            color: var(--accent-pink);
            border: 1px solid rgba(255, 75, 139, 0.3);
        }

        .stat-icon.purple {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-purple);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .stat-icon.cyan {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .stat-info .number {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .stat-info .label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Filter Controls */
        .controls-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 260px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            height: 48px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 0 18px 0 48px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        /* Messages List Grid */
        .messages-list {
            display: grid;
            gap: 16px;
        }

        .message-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.2s ease;
            position: relative;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-card:hover {
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-id {
            background: rgba(255, 255, 255, 0.06);
            color: var(--accent-cyan);
            font-family: monospace;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .badge-part {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-ip {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            font-family: monospace;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .time-stamp {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-body {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 14px;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(255, 75, 139, 0.15);
            border-color: rgba(255, 75, 139, 0.4);
            color: var(--text-primary);
        }

        /* Empty & Loading State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 24px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(18, 20, 29, 0.95);
            border: 1px solid var(--accent-purple);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Ambient Mesh BG -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Auth Modal Overlay -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <div class="auth-icon">
                <i class="fa-solid fa-user-lock"></i>
            </div>
            <h2>Admin Authentication</h2>
            <p>Enter your secret <code>ADMIN_KEY</code> to view anonymous messages.</p>

            <form id="authForm">
                <div class="auth-input-group">
                    <input type="password" id="adminKeyInput" class="auth-input" placeholder="Enter Admin Secret Key..."
                        required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn" id="authBtn">Unlock Vault</button>
                <div class="auth-error" id="authError">Invalid key! Access denied.</div>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="wrapper">

        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="brand-title">
                <i class="fa-solid fa-user-secret"></i>
                <h1>Secret Vault</h1>
            </div>
            <div class="top-actions">
                <button class="action-btn" id="refreshBtn">
                    <i class="fa-solid fa-rotate-right"></i> Refresh
                </button>
                <button class="action-btn" id="configApiBtn">
                    <i class="fa-solid fa-gear"></i> Server API
                </button>
                <button class="action-btn danger" id="logoutBtn">
                    <i class="fa-solid fa-lock"></i> Lock
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon pink">
                    <i class="fa-solid fa-envelope-open-text"></i>
                </div>
                <div class="stat-info">
                    <div class="number" id="statTotal">0</div>
                    <div class="label">Total Messages</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fa-solid fa-calendar-day"></i>
                </div>
                <div class="stat-info">
                    <div class="number" id="statToday">0</div>
                    <div class="label">Received Today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon cyan">
                    <i class="fa-solid fa-clock-history"></i>
                </div>
                <div class="stat-info">
                    <div class="number" id="statLatest" style="font-size: 1.1rem; font-weight: 700;">Never</div>
                    <div class="label">Latest Confession</div>
                </div>
            </div>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search messages by text or date...">
            </div>
        </div>

        <!-- Messages Container -->
        <main class="messages-list" id="messagesContainer">
            <div class="empty-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <h3>Loading secret vault...</h3>
            </div>
        </main>

    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check" style="color: var(--accent-pink);"></i>
        <span id="toastText">Action completed</span>
    </div>

    <script>
        let apiBaseUrl = localStorage.getItem('api_base_url') || "https://overcome-attractions-wallpapers-sitting.trycloudflare.com";
        let adminKey = sessionStorage.getItem('admin_key') || localStorage.getItem('admin_key') || '';
        let loadedMessages = [];

        const authOverlay = document.getElementById('authOverlay');
        const authForm = document.getElementById('authForm');
        const adminKeyInput = document.getElementById('adminKeyInput');
        const authError = document.getElementById('authError');
        const messagesContainer = document.getElementById('messagesContainer');
        const searchInput = document.getElementById('searchInput');

        // Check authentication status on load
        if (adminKey) {
            fetchMessages();
        }

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputKey = adminKeyInput.value.trim();
            if (!inputKey) return;

            adminKey = inputKey;
            authError.style.display = 'none';

            const authBtn = document.getElementById('authBtn');
            const originalText = authBtn.innerHTML;
            authBtn.disabled = true;
            authBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Unlocking Vault...';

            try {
                const success = await fetchMessages();
                if (success) {
                    sessionStorage.setItem('admin_key', adminKey);
                    localStorage.setItem('admin_key', adminKey);
                } else {
                    authError.style.display = 'block';
                }
            } finally {
                authBtn.disabled = false;
                authBtn.innerHTML = originalText;
            }
        });

        async function fetchMessages() {
            try {
                const res = await fetch(`${apiBaseUrl}/messages`, {
                    headers: {
                        'x-admin-key': adminKey
                    }
                });

                if (res.status === 401) {
                    authOverlay.style.opacity = '1';
                    authOverlay.style.visibility = 'visible';
                    return false;
                }

                if (!res.ok) throw new Error("Failed to load messages.");

                const data = await res.json();
                loadedMessages = data;

                // Hide overlay
                authOverlay.style.opacity = '0';
                authOverlay.style.visibility = 'hidden';

                updateStats();
                renderMessages(loadedMessages);
                return true;

            } catch (err) {
                console.error(err);
                if (authOverlay.style.visibility !== 'hidden') {
                    authError.textContent = err.message || "Connection error";
                    authError.style.display = 'block';
                }
                return false;
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = loadedMessages.length;

            const todayStr = new Date().toISOString().split('T')[0];
            const todayCount = loadedMessages.filter(m => m.time && m.time.startsWith(todayStr)).length;
            document.getElementById('statToday').textContent = todayCount;

            if (loadedMessages.length > 0 && loadedMessages[0].time) {
                const relativeTime = formatRelativeTime(new Date(loadedMessages[0].time));
                document.getElementById('statLatest').textContent = relativeTime;
            } else {
                document.getElementById('statLatest').textContent = 'None yet';
            }
        }

        function renderMessages(messages) {
            const query = searchInput.value.toLowerCase().trim();
            const filtered = messages.filter(m => {
                const content = (m.message || m.text || '').toLowerCase();
                const timeStr = (m.time || '').toLowerCase();
                const ipStr = (m.ip || '').toLowerCase();
                return content.includes(query) || timeStr.includes(query) || ipStr.includes(query);
            });

            if (filtered.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-inbox"></i>
                        <h3>No messages found</h3>
                        <p>${messages.length === 0 ? 'Your vault is empty. No confessions submitted yet!' : 'No messages match your search criteria.'}</p>
                    </div>
                `;
                return;
            }

            messagesContainer.innerHTML = filtered.map((item, index) => {
                const textContent = item.message || item.text || 'Empty message';
                const hasId = item.id ? item.id.substring(0, 8) : `log-#${messages.length - index}`;
                const isPart = textContent.includes('(Part ');
                const formattedTime = item.time ? new Date(item.time).toLocaleString(undefined, {
                    dateStyle: 'medium',
                    timeStyle: 'medium'
                }) : 'Unknown Time';

                return `
                    <div class="message-card" style="animation-delay: ${Math.min(index * 0.05, 0.5)}s;">
                        <div class="card-header">
                            <div class="card-meta">
                                <span class="badge-id"><i class="fa-solid fa-fingerprint"></i> ${hasId}</span>
                                ${item.ip ? `<span class="badge-ip"><i class="fa-solid fa-network-wired"></i> IP: ${escapeHtml(item.ip)}</span>` : ''}
                                ${isPart ? `<span class="badge-part"><i class="fa-solid fa-scissors"></i> Split Part</span>` : ''}
                            </div>
                            <div class="time-stamp">
                                <i class="fa-regular fa-clock"></i> ${formattedTime}
                            </div>
                        </div>
                        <div class="message-body">${escapeHtml(textContent)}</div>
                        <div class="card-footer">
                            <button class="copy-btn" onclick="copyText('${escapeJs(textContent)}')">
                                <i class="fa-regular fa-copy"></i> Copy Text
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        searchInput.addEventListener('input', () => {
            renderMessages(loadedMessages);
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            fetchMessages();
            showToast("Refreshed vault messages");
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('admin_key');
            localStorage.removeItem('admin_key');
            adminKey = '';
            adminKeyInput.value = '';
            authOverlay.style.opacity = '1';
            authOverlay.style.visibility = 'visible';
            showToast("Vault locked");
        });

        document.getElementById('configApiBtn').addEventListener('click', () => {
            const newUrl = prompt("Enter backend API Base URL:", apiBaseUrl);
            if (newUrl !== null && newUrl.trim() !== "") {
                apiBaseUrl = newUrl.trim().replace(/\/$/, "");
                localStorage.setItem('api_base_url', apiBaseUrl);
                fetchMessages();
                showToast("API Base URL updated!");
            }
        });

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to clipboard!");
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeJs(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
        }

        function formatRelativeTime(date) {
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }
    </script>
</body>
